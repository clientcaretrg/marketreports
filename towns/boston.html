<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Boston Neighborhoods Market Report — The Rasner Group</title>
  <meta name="description" content="Quarterly real estate market report for Boston neighborhoods — The Rasner Group." />
  <link rel="stylesheet" href="../assets/css/style.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    /* ── Neighborhood selector ── */
    .nbhd-layout {
      display: grid;
      grid-template-columns: 220px 1fr;
      gap: 0;
      margin-top: 24px;
      border: 1px solid var(--border);
      background: var(--border);
    }

    .nbhd-sidebar {
      background: var(--white);
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
    }

    .nbhd-sidebar-header {
      padding: 14px 18px;
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 500;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
    }

    .nbhd-btn {
      width: 100%;
      text-align: left;
      background: var(--white);
      border: none;
      border-bottom: 1px solid var(--teal-light);
      padding: 11px 18px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      color: var(--ink);
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      line-height: 1.3;
      position: relative;
    }
    .nbhd-btn:last-child { border-bottom: none; }
    .nbhd-btn:hover { background: var(--teal-light); }
    .nbhd-btn.active {
      background: var(--teal-dark);
      color: var(--white);
      font-weight: 500;
    }
    .nbhd-btn.active::after {
      content: '';
      position: absolute;
      right: -1px;
      top: 50%;
      transform: translateY(-50%);
      width: 0; height: 0;
      border-top: 8px solid transparent;
      border-bottom: 8px solid transparent;
      border-right: 8px solid var(--bg);
    }
    .nbhd-btn .nbhd-no-data {
      display: block;
      font-size: 9px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 2px;
      font-weight: 400;
    }
    .nbhd-btn.active .nbhd-no-data { color: rgba(255,255,255,0.5); }

    /* ── Neighborhood panels ── */
    .nbhd-panel-wrap {
      background: var(--bg);
      padding: 24px;
      min-height: 500px;
    }

    .nbhd-panel { display: none; }
    .nbhd-panel.active { display: block; }

    .nbhd-panel-header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      border-bottom: 2px solid var(--ink);
      padding-bottom: 14px;
      margin-bottom: 0;
    }
    .nbhd-panel-header .eyebrow {
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 500;
      margin-bottom: 5px;
    }
    .nbhd-panel-header h2 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(20px, 3vw, 30px);
      font-weight: 700;
      line-height: 1.1;
      letter-spacing: -0.02em;
    }
    .nbhd-panel-header h2 span { color: var(--teal-dark); }
    .nbhd-panel-meta { text-align: right; font-size: 11px; color: var(--muted); line-height: 1.9; }

    /* Placeholder state */
    .nbhd-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 360px;
      gap: 16px;
      color: var(--muted);
    }
    .nbhd-placeholder-icon {
      width: 56px; height: 56px;
      border-radius: 50%;
      background: var(--teal-light);
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
    }
    .nbhd-placeholder h3 {
      font-family: 'Playfair Display', serif;
      font-size: 18px;
      font-weight: 600;
      color: var(--ink);
    }
    .nbhd-placeholder p { font-size: 13px; text-align: center; max-width: 300px; line-height: 1.6; }

    /* Mobile collapse */
    @media (max-width: 680px) {
      .nbhd-layout { grid-template-columns: 1fr; }
      .nbhd-sidebar { display: grid; grid-template-columns: 1fr 1fr; border-right: none; border-bottom: 1px solid var(--border); }
      .nbhd-sidebar-header { grid-column: 1 / -1; }
      .nbhd-btn.active::after { display: none; }
      .nbhd-panel-wrap { padding: 16px; }
    }
  </style>
</head>

<!-- Chart library + rendering engine -->
<script src="../assets/js/report-charts.js"></script>
<script>
  const fmtM  = v => v >= 1e6 ? '$'+(v/1e6).toFixed(2)+'M' : v ? '$'+(v/1000).toFixed(0)+'K' : '—';
  const last  = a => a[a.length-1];
  const prev  = a => a[a.length-2];
  const pct   = (a,b) => b ? ((a-b)/b*100).toFixed(1) : null;
  const empty = a => !a || a.every(v=>!v);

  // Chart instance registry — so we can destroy before re-creating
  const chartRegistry = {};

  function priceRange(d) {
    const all = [...d.avgSale,...d.medSale,...d.avgList].filter(Boolean);
    if (!all.length) return [0,1000000];
    const mn=Math.min(...all), mx=Math.max(...all), pad=(mx-mn)*0.15||mx*0.2;
    return [Math.max(0,Math.floor((mn-pad)/50000)*50000), Math.ceil((mx+pad)/50000)*50000];
  }
  function ratioRange(d) {
    const all = d.ratio.filter(Boolean);
    if (!all.length) return [95,110];
    return [Math.floor(Math.min(...all)-2), Math.ceil(Math.max(...all)+2)];
  }

  function makeId(nbhd, type, chart) { return `${nbhd}__${type}__${chart}`; }

  function destroyChart(id) {
    if (chartRegistry[id]) { chartRegistry[id].destroy(); delete chartRegistry[id]; }
  }

  // Override RasnerCharts to track instances
  const _origPrice = RasnerCharts.makePrice;
  const _origRatio = RasnerCharts.makeRatio;
  const _origSold  = RasnerCharts.makeSold;
  const _origDom   = RasnerCharts.makeDom;

  // Build the HTML for one property-type section inside a panel
  function sectionHTML(nbhd, type, typeName, unitLabel) {
    const idPre = makeId(nbhd, type, '');
    return `
      <div class="report-section ${type === 'sf' ? 'active' : ''}" id="nbhd-section-${nbhd}-${type}">
        <div class="kpi-strip">
          <div class="kpi dark">
            <div class="kpi-label">Latest Avg Sale Price</div>
            <div class="kpi-value" id="${idPre}kpi-avg">—</div>
            <div class="kpi-change" id="${idPre}kpi-avg-chg"></div>
          </div>
          <div class="kpi">
            <div class="kpi-label">Latest Median Sale</div>
            <div class="kpi-value" id="${idPre}kpi-med">—</div>
            <div class="kpi-change" id="${idPre}kpi-med-chg"></div>
          </div>
          <div class="kpi">
            <div class="kpi-label">Sale-to-List Ratio</div>
            <div class="kpi-value" id="${idPre}kpi-ratio">—</div>
            <div class="kpi-change" id="${idPre}kpi-ratio-lbl"></div>
          </div>
          <div class="kpi">
            <div class="kpi-label">Avg Days on Market</div>
            <div class="kpi-value" id="${idPre}kpi-dom">—</div>
            <div class="kpi-change" id="${idPre}kpi-dom-lbl"></div>
          </div>
        </div>
        <div class="chart-grid wide">
          <div class="card">
            <div class="card-label">Pricing Trends</div>
            <div class="card-title">Average &amp; Median Sale Price</div>
            <div class="chart-wrap"><canvas id="${idPre}price"></canvas></div>
            <div class="legend-row">
              <div class="legend-item"><div class="legend-dot" style="background:#295c6f"></div>Avg Sale</div>
              <div class="legend-item"><div class="legend-dot" style="background:#71a495"></div>Median Sale</div>
              <div class="legend-item"><div style="width:16px;height:2px;background:#bbb;flex-shrink:0"></div>Avg List</div>
            </div>
          </div>
          <div class="card">
            <div class="card-label">Offer Competitiveness</div>
            <div class="card-title">Sale-to-List Ratio</div>
            <div class="chart-wrap"><canvas id="${idPre}ratio"></canvas></div>
            <div class="chart-note">Values above 100% indicate overbidding.</div>
          </div>
        </div>
        <div class="chart-grid">
          <div class="card">
            <div class="card-label">Market Activity</div>
            <div class="card-title">${unitLabel} Sold per Quarter</div>
            <div class="chart-wrap"><canvas id="${idPre}sold"></canvas></div>
          </div>
          <div class="card">
            <div class="card-label">Time on Market</div>
            <div class="card-title">Days on Market vs Days to Offer</div>
            <div class="chart-wrap"><canvas id="${idPre}dom"></canvas></div>
            <div class="legend-row">
              <div class="legend-item"><div class="legend-dot" style="background:#295c6f"></div>Days on Market</div>
              <div class="legend-item"><div class="legend-dot" style="background:#71a495"></div>Days to Offer</div>
            </div>
          </div>
        </div>
      </div>`;
  }

  function placeholderHTML(name) {
    return `
      <div class="nbhd-placeholder">
        <div class="nbhd-placeholder-icon">📍</div>
        <h3>${name}</h3>
        <p>Market data for this neighborhood will be available soon. Contact us to request a specific report.</p>
        <a href="mailto:ilya@rasnergroup.com?subject=Boston ${name} Market Report" style="font-size:11px;letter-spacing:0.12em;text-transform:uppercase;font-weight:500;color:var(--teal-dark);border:1px solid var(--teal-dark);padding:8px 18px;transition:all 0.18s;">Request Data</a>
      </div>`;
  }


  // KPI fill helpers
  function setEl(id, val) { const e=document.getElementById(id); if(e) e.textContent=val; }
  function setChg(id, label, isDown) {
    const e=document.getElementById(id);
    if(!e) return;
    e.textContent=label;
    e.className='kpi-change'+(isDown?' down':'');
  }

  function fillKpis(nbhd, type, d) {
    if (empty(d.avgSale)) return;
    const pre = makeId(nbhd, type, '');
    const a=last(d.avgSale), ap=prev(d.avgSale);
    const m=last(d.medSale), mp=prev(d.medSale);
    const r=last(d.ratio), dom=last(d.dom), domp=prev(d.dom);
    setEl(pre+'kpi-avg', fmtM(a));
    setEl(pre+'kpi-med', fmtM(m));
    setEl(pre+'kpi-ratio', r ? r.toFixed(1)+'%' : '—');
    setEl(pre+'kpi-dom', dom ? dom+' days' : '—');
    if (ap) { const d1=pct(a,ap); setChg(pre+'kpi-avg-chg', `${+d1>0?'↑':'↓'} vs prior quarter`, +d1<0); }
    if (mp) { const d2=pct(m,mp); setChg(pre+'kpi-med-chg', `${+d2>0?'↑':'↓'} quarter over quarter`, +d2<0); }
    if (r) {
      const lbl = r>=101 ? "Sellers' market" : r>=99 ? 'Near asking' : "Buyers' market";
      const e=document.getElementById(pre+'kpi-ratio-lbl');
      if(e){ e.textContent=lbl; e.className='kpi-change neutral'; }
    }
    if (dom&&domp) { const dd=pct(dom,domp); setChg(pre+'kpi-dom-lbl',`${+dd>0?'↑':'↓'} vs prior quarter`,+dd>0); }
  }

  // Draw charts for one neighborhood (called once when first activated)
  const rendered = new Set();
  function renderNeighborhood(slug) {
    if (rendered.has(slug)) return;
    rendered.add(slug);
    const nbhd = NEIGHBORHOODS[slug];
    if (!nbhd) return;
    [['sf','sf'],['condo','condo'],['mf','mf']].forEach(([type]) => {
      const d = nbhd[type];
      if (empty(d.avgSale)) return;
      fillKpis(slug, type, d);
      const pre = makeId(slug, type, '');
      const [pMin,pMax] = priceRange(d);
      const [rMin,rMax] = ratioRange(d);
      RasnerCharts.makePrice(pre+'price', d, pMin, pMax);
      RasnerCharts.makeRatio(pre+'ratio', d, rMin, rMax);
      RasnerCharts.makeSold(pre+'sold', d);
      RasnerCharts.makeDom(pre+'dom', d);
    });
  }

  // Activate the first neighborhood on load
  window.addEventListener('load', function() {
  // Build & inject all panels on load
  const panelWrap = document.getElementById('nbhd-panels');
  let firstPanel = true;
  for (const [slug, nbhd] of Object.entries(NEIGHBORHOODS)) {
    const hasData = !empty(nbhd.sf.avgSale) || !empty(nbhd.condo.avgSale) || !empty(nbhd.mf.avgSale);
    const panelDiv = document.createElement('div');
    panelDiv.className = 'nbhd-panel' + (firstPanel ? ' active' : '');
    panelDiv.id = `panel-${slug}`;
    panelDiv.innerHTML = `
      <div class="nbhd-panel-header">
        <div>
          <div class="eyebrow">Boston, MA</div>
          <h2>${nbhd.name}</h2>
        </div>
        <div class="nbhd-panel-meta">Q1 2025 – Q1 2026<br />MLS Closed Sales</div>
      </div>
      ${hasData
        ? sectionHTML(slug,'sf','Single Family','Homes') + sectionHTML(slug,'condo','Condos','Units') + sectionHTML(slug,'mf','Multi-Family','Properties')
        : placeholderHTML(nbhd.name)
      }`;
    panelWrap.appendChild(panelDiv);
    firstPanel = false;
  }

  renderNeighborhood('allston');

  // ── Neighborhood sidebar clicks ──────────────────────────────────────────
  document.querySelectorAll('.nbhd-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const slug = btn.dataset.nbhd;

      // Sidebar active state
      document.querySelectorAll('.nbhd-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');

      // Panel swap
      document.querySelectorAll('.nbhd-panel').forEach(p => p.classList.remove('active'));
      const panel = document.getElementById(`panel-${slug}`);
      if (panel) {
        panel.classList.add('active');
        // Reset to SF tab when switching neighborhood
        activePropertyType = 'sf';
        syncPropertyTabs(panel);
      }

      // Lazy-render charts
      renderNeighborhood(slug);
    });
  });

  // ── Property type tabs ───────────────────────────────────────────────────
  let activePropertyType = 'sf';

  function syncPropertyTabs(panel) {
    // Update tab buttons
    document.querySelectorAll('.nav-tab').forEach(t => {
      t.classList.toggle('active', t.dataset.section === activePropertyType);
    });
    // Show matching section inside the active panel
    if (!panel) return;
    panel.querySelectorAll('.report-section').forEach(s => s.classList.remove('active'));
    const activeSlug = document.querySelector('.nbhd-btn.active')?.dataset.nbhd;
    const sec = document.getElementById(`nbhd-section-${activeSlug}-${activePropertyType}`);
    if (sec) sec.classList.add('active');
  }

  document.querySelectorAll('.nav-tab').forEach(btn => {
    btn.addEventListener('click', () => {
      activePropertyType = btn.dataset.section;
      const activePanel = document.querySelector('.nbhd-panel.active');
      syncPropertyTabs(activePanel);
    });
  });
  }); // end load
</script>
